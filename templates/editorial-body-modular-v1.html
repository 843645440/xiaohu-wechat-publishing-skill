<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editorial Body Modular Cards</title>
  <style>
    :root {
      --paper: #f7f3ea;
      --paper-2: #efe7d8;
      --ink: #111111;
      --muted: #6b675f;
      --navy: #183153;
      --red: #b42318;
      --gold: #b98a18;
      --line: rgba(17,17,17,0.12);
    }
    * { box-sizing: border-box; }
    @font-face {
      font-family: "XinYuGongHeXieSong";
      src: url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-L.ttf") format("truetype");
      font-weight: 300; font-style: normal; font-display: block;
    }
    @font-face {
      font-family: "XinYuGongHeXieSong";
      src: url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-R.ttf") format("truetype");
      font-weight: 400; font-style: normal; font-display: block;
    }
    @font-face {
      font-family: "XinYuGongHeXieSong";
      src: url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-M.ttf") format("truetype");
      font-weight: 500; font-style: normal; font-display: block;
    }
    @font-face {
      font-family: "XinYuGongHeXieSong";
      src: url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-S.ttf") format("truetype");
      font-weight: 600; font-style: normal; font-display: block;
    }
    @font-face {
      font-family: "XinYuGongHeXieSong";
      src: url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-B.ttf") format("truetype");
      font-weight: 700; font-style: normal; font-display: block;
    }
    @font-face {
      font-family: "XinYuGongHeXieSong";
      src: url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-H.ttf") format("truetype");
      font-weight: 900; font-style: normal; font-display: block;
    }
    @font-face {
      font-family: "WQYZenHeiLocal";
      src: url("file:///usr/share/fonts/truetype/wqy/wqy-zenhei.ttc") format("truetype");
      font-weight: 400 950;
      font-style: normal;
      font-display: block;
    }
    body {
      margin: 0;
      width: 800px;
      min-height: 1000px;
      font-family: "XinYuGongHeXieSong","WQYZenHeiLocal","WenQuanYi Zen Hei","Noto Sans CJK SC","PingFang SC","Microsoft YaHei",sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(185,138,24,.12), transparent 30%),
        radial-gradient(circle at 88% 14%, rgba(24,49,83,.08), transparent 26%),
        linear-gradient(180deg, var(--paper) 0%, #f2ebde 100%);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(17,17,17,0.024) 1px, transparent 1px), linear-gradient(90deg, rgba(17,17,17,0.02) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: .42;
      pointer-events: none;
    }
    .page {
      position: relative;
      z-index: 1;
      min-height: 1000px;
      padding: 54px 50px 46px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .eyebrow::before {
      content: "";
      width: 40px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--red), var(--gold));
    }
    .title {
      font-size: 56px;
      line-height: 1.08;
      font-weight: 950;
      letter-spacing: -1.4px;
      margin: 0;
      max-width: 680px;
    }
    .subtitle {
      margin-top: 16px;
      font-size: 27px;
      line-height: 1.55;
      color: var(--muted);
      font-weight: 580;
      max-width: 680px;
    }
    .metric-panel, .card, .module-box, .quote-box {
      background: linear-gradient(180deg, rgba(255,255,255,.8), rgba(255,255,255,.58));
      border: 1px solid rgba(17,17,17,.08);
      box-shadow: 0 18px 40px rgba(59,44,18,.08);
      border-radius: 28px;
    }
    .metric-panel {
      margin-top: 30px;
      padding: 28px 28px 24px;
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 22px;
      align-items: stretch;
    }
    .metric-label {
      font-size: 21px;
      font-weight: 800;
      color: var(--muted);
    }
    .metric-value {
      margin-top: 8px;
      font-size: 116px;
      line-height: .92;
      font-weight: 950;
      color: var(--red);
      letter-spacing: -4px;
    }
    .metric-unit {
      font-size: 40px;
      font-weight: 900;
      color: var(--ink);
      margin-left: 8px;
    }
    .metric-note {
      margin-top: 12px;
      font-size: 24px;
      line-height: 1.52;
      font-weight: 650;
    }
    .side-stack {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .card {
      padding: 18px 18px 16px;
      min-height: 142px;
    }
    .mini-head {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--navy);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .mini-head.red { background: var(--red); }
    .card-title {
      font-size: 30px;
      line-height: 1.18;
      font-weight: 920;
    }
    .card-desc {
      margin-top: 8px;
      font-size: 22px;
      line-height: 1.52;
      color: var(--muted);
      font-weight: 640;
    }
    .section-title {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 27px;
      font-weight: 920;
    }
    .section-title::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: var(--gold);
      transform: rotate(12deg);
      box-shadow: 18px 0 0 rgba(180,35,24,.22);
    }
    .people-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .person {
      position: relative;
      padding: 22px 24px 20px;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 18px;
      align-items: start;
    }
    .person::before {
      content: attr(data-rank);
      position: absolute;
      right: 14px;
      top: 8px;
      font-size: 96px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -4px;
      color: rgba(24,49,83,.08);
    }
    .person-name {
      font-size: 37px;
      line-height: 1.08;
      font-weight: 950;
    }
    .person-role {
      margin-top: 8px;
      font-size: 20px;
      line-height: 1.42;
      color: var(--navy);
      font-weight: 820;
    }
    .person-cap {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .cap-value {
      font-size: 54px;
      line-height: 1;
      font-weight: 950;
      color: var(--red);
      letter-spacing: -2px;
    }
    .cap-unit {
      font-size: 23px;
      font-weight: 900;
    }
    .person-copy {
      margin-top: 12px;
      font-size: 22px;
      line-height: 1.6;
      color: var(--muted);
      font-weight: 620;
    }
    .structure-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .module-box {
      padding: 22px 20px 18px;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    .module-box.navy { background: linear-gradient(180deg, #193455, #244163); color: #fff; }
    .module-box.red { background: linear-gradient(180deg, #ab1f17, #c42f25); color: #fff; }
    .module-box.gold { background: linear-gradient(180deg, #f0dfb6, #ead29d); color: #1a1a1a; }
    .module-box.ink { background: linear-gradient(180deg, #272727, #151515); color: #fff; }
    .module-kicker {
      font-size: 17px;
      font-weight: 850;
      opacity: .88;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .module-main {
      margin-top: 12px;
      font-size: 31px;
      line-height: 1.18;
      font-weight: 950;
      letter-spacing: -.6px;
    }
    .module-sub {
      margin-top: 10px;
      font-size: 22px;
      line-height: 1.56;
      font-weight: 630;
      opacity: .94;
    }
    .quote-box {
      margin-top: 22px;
      padding: 20px 22px 18px;
    }
    .quote-text {
      font-size: 24px;
      line-height: 1.62;
      color: var(--muted);
      font-weight: 640;
    }
    .footer-note {
      margin-top: 18px;
      border-top: 1px dashed rgba(17,17,17,.18);
      padding-top: 16px;
      font-size: 19px;
      line-height: 1.52;
      color: var(--muted);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1 class="title">{{TITLE}}</h1>
    <div class="subtitle">{{SUBTITLE}}</div>

    {{CONTENT_BLOCK}}

    <div class="footer-note">{{FOOTER_NOTE}}</div>
  </div>
</body>
</html>
