<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magazine Cover Template V1</title>
  <style>
    @font-face {
      font-family: "XinYuGongHeXieSong";
      src: url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-H.ttf") format("truetype");
      font-weight: 900;
      font-display: block;
    }
    @font-face {
      font-family: "WQYZenHeiLocal";
      src: url("file:///usr/share/fonts/truetype/wqy/wqy-zenhei.ttc") format("truetype");
      font-weight: 400 950;
      font-display: block;
    }
    :root {
      --paper: #efe8dc;
      --paper-light: #fbf7ed;
      --ink: #111111;
      --soft-ink: rgba(17, 17, 17, .66);
      --red: #921d16;
      --red-dark: #72110e;
      --red-soft: rgba(146, 29, 22, .85);
      --frame: #151515;
      --serif-title: "XinYuGongHeXieSong", "Songti SC", "STSong", "Noto Serif CJK SC", "SimSun", serif;
      --sans-title: "Hiragino Sans GB", "STHeiti", "PingFang SC", "WQYZenHeiLocal", "Microsoft YaHei", sans-serif;
      --ui-font: "PingFang SC", "Hiragino Sans GB", "WQYZenHeiLocal", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 900px;
      height: 383px;
      overflow: hidden;
      background: var(--frame);
      color: var(--ink);
      font-family: var(--serif-title);
    }
    .cover {
      position: relative;
      width: 900px;
      height: 383px;
      overflow: hidden;
      border: 7px solid var(--frame);
      background:
        radial-gradient(circle at 83% 56%, rgba(146, 29, 22, .10), transparent 23%),
        linear-gradient(180deg, var(--paper-light) 0%, var(--paper) 100%);
      isolation: isolate;
    }
    .cover::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(rgba(36, 30, 24, .16) .55px, transparent .65px) 62px 22px / 4px 4px,
        radial-gradient(rgba(109, 46, 38, .10) .7px, transparent .9px) 190px 54px / 19px 17px,
        linear-gradient(90deg, rgba(255,255,255,.28), transparent 26% 74%, rgba(0,0,0,.05));
      opacity: .34;
      pointer-events: none;
    }
    .cover::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 20;
      background:
        linear-gradient(90deg, rgba(255,255,255,.20), transparent 30% 78%, rgba(0,0,0,.09)),
        radial-gradient(circle at 31% 24%, rgba(255,255,255,.38), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(110, 64, 37, .10), transparent 42%);
      mix-blend-mode: soft-light;
      pointer-events: none;
    }
    .dot-field,
    .grid-mark,
    .red-arc {
      position: absolute;
      pointer-events: none;
    }
    .dot-field {
      z-index: 1;
      width: 126px;
      height: 156px;
      background-image: radial-gradient(rgba(17,17,17,.34) .55px, transparent .72px);
      background-size: 5px 5px;
      opacity: .26;
    }
    .dot-left { left: 70px; top: 5px; }
    .dot-right { right: 32px; top: 12px; }
    .grid-mark {
      z-index: 2;
      right: 22px;
      top: 22px;
      width: 80px;
      height: 146px;
      border-top: 1px solid rgba(17,17,17,.24);
      border-right: 1px solid rgba(17,17,17,.30);
      border-bottom: 1px solid rgba(17,17,17,.22);
      background:
        linear-gradient(90deg, transparent 0 48px, rgba(17,17,17,.22) 48px 49px, transparent 49px),
        linear-gradient(180deg, transparent 0 74px, rgba(17,17,17,.20) 74px 75px, transparent 75px);
      opacity: .60;
    }
    .red-arc {
      z-index: 2;
      right: -34px;
      top: 112px;
      width: 240px;
      height: 240px;
      border: 10px solid var(--red-soft);
      border-radius: 50%;
      opacity: .74;
    }
    .top-red {
      position: absolute;
      z-index: 5;
      left: 50px;
      top: 42px;
      width: 174px;
      height: 7px;
      background: var(--red);
    }
    .thin-rule {
      position: absolute;
      z-index: 4;
      left: 48px;
      top: 95px;
      width: 432px;
      height: 1px;
      background: rgba(146,29,22,.62);
    }
    .right-panel {
      position: absolute;
      z-index: 2;
      right: 0;
      top: 78px;
      width: 380px;
      height: 288px;
      background: transparent;
      overflow: hidden;
    }
    .right-meta {
      position: absolute;
      z-index: 10;
      right: 330px;
      top: 46px;
      min-height: 72px;
      padding-top: 14px;
      padding-left: 16px;
      border-left: 2px solid rgba(17,17,17,.72);
      color: rgba(17,17,17,.72);
      font-family: var(--ui-font);
      font-size: 10px;
      line-height: 1.48;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .right-meta::before {
      content: "";
      position: absolute;
      top: 0;
      left: 16px;
      width: 46px;
      height: 5px;
      background: var(--red);
    }
    .copy {
      position: absolute;
      z-index: 8;
      left: 48px;
      top: 64px;
      width: 604px;
    }
    .subtitle {
      display: inline-block;
      color: var(--red);
      font-size: 31px;
      line-height: 1;
      font-weight: 900;
      margin-bottom: 16px;
      padding: 0 26px 7px 0;
      border-bottom: 1px solid rgba(146,29,22,.58);
      text-shadow: 0 1px 0 rgba(255,255,255,.28);
    }
    .cover-title {
      margin: 0;
      color: var(--ink);
      font-family: var(--serif-title);
      font-size: 114px;
      line-height: .90;
      font-weight: 900;
      letter-spacing: 0;
      max-width: 590px;
      word-break: keep-all;
      overflow-wrap: break-word;
      text-shadow:
        0 1px 0 rgba(255,255,255,.22),
        0 2px 0 rgba(17,17,17,.06);
    }
    .title-short .cover-title { font-size: 134px; line-height: .88; max-width: 610px; }
    .title-medium .cover-title { font-size: 114px; }
    .title-long .cover-title { font-size: 82px; line-height: .95; max-width: 632px; }
    .highlight {
      margin-top: 12px;
      display: inline-block;
      color: var(--ink);
      font-family: var(--serif-title);
      font-size: 50px;
      line-height: 1.02;
      font-weight: 900;
      text-shadow: 0 1px 0 rgba(255,255,255,.24);
    }
    .tags {
      position: absolute;
      z-index: 8;
      left: 51px;
      bottom: 48px;
      min-width: 430px;
      padding-top: 15px;
      border-top: 1px solid rgba(146,29,22,.58);
      color: rgba(17,17,17,.78);
      font-family: var(--ui-font);
      font-size: 18px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 2px;
      display: none;
    }
    .brand-chip {
      position: absolute;
      z-index: 8;
      left: 76px;
      bottom: 40px;
      display: none;
      align-items: center;
      gap: 10px;
      color: rgba(17,17,17,.54);
      font-family: var(--ui-font);
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .brand-chip::before {
      content: "";
      width: 6px;
      height: 20px;
      background: var(--red);
    }
    .persona-stage {
      position: absolute;
      z-index: 7;
      right: -26px;
      bottom: 0;
      width: 430px;
      height: 383px;
      overflow: hidden;
    }
    .persona-img {
      position: absolute;
      display: block;
      width: auto;
      max-width: none;
      filter: saturate(.92) contrast(1.12) brightness(.97);
      transform-origin: right bottom;
    }
    .persona-mode-half .persona-img {
      height: 720px;
      right: -40px;
      bottom: -364px;
    }
    .persona-mode-shoulder .persona-img {
      height: 900px;
      right: -104px;
      bottom: -548px;
    }
    .persona-mode-bust .persona-img {
      height: 820px;
      right: -82px;
      bottom: -472px;
    }
    .cut-slab {
      position: absolute;
      z-index: 9;
      right: -34px;
      bottom: -55px;
      width: 506px;
      height: 118px;
      background: #171717;
      transform: rotate(-7deg);
      transform-origin: right bottom;
      box-shadow: 0 -1px 0 rgba(255,255,255,.04) inset;
      display: none;
    }
    .cover.xiaocong {
      --red: #8f1f18;
      --red-dark: #74130f;
      --red-soft: rgba(143,31,24,.86);
    }
    .cover.yeluzi {
      --red: #9d2119;
      --red-dark: #79130f;
      --red-soft: rgba(157,33,25,.86);
    }

    .portrait-anchor .copy {
      left: 46px;
      top: 60px;
      width: 515px;
    }
    .portrait-anchor .subtitle {
      font-size: 30px;
      margin-bottom: 18px;
      padding-right: 36px;
      white-space: nowrap;
    }
    .portrait-anchor .cover-title {
      max-width: 505px;
      font-size: 122px;
      line-height: .88;
    }
    .portrait-anchor.title-short .cover-title { font-size: 140px; }
    .portrait-anchor.title-medium .cover-title { font-size: 114px; }
    .portrait-anchor.title-long .cover-title { font-size: 86px; line-height: .94; max-width: 545px; }
    .portrait-anchor .highlight {
      display: block;
      margin-top: 18px;
      font-size: 46px;
    }
    .portrait-anchor .right-panel {
      right: -2px;
      top: 91px;
      width: 382px;
      height: 274px;
      background: transparent;
    }
    .portrait-anchor .right-panel::before {
      content: "";
      position: absolute;
      right: -86px;
      bottom: -102px;
      width: 246px;
      height: 246px;
      border: 10px solid var(--red-soft);
      border-radius: 50%;
    }
    .portrait-anchor .right-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(rgba(255,255,255,.18) .45px, transparent .66px) 0 0 / 5px 5px;
      opacity: .10;
    }
    .portrait-anchor .red-arc { display: none; }
    .portrait-anchor .top-red {
      left: 50px;
      top: 42px;
      width: 174px;
      height: 7px;
    }
    .portrait-anchor .thin-rule {
      left: 48px;
      top: 100px;
      width: 430px;
    }
    .portrait-anchor .tags {
      left: 50px;
      bottom: 50px;
      min-width: 430px;
    }
    .portrait-anchor .persona-stage {
      right: -42px;
      width: 452px;
    }
    .portrait-anchor.persona-mode-half .persona-img {
      height: 760px;
      right: -52px;
      bottom: -380px;
    }
    .portrait-anchor.persona-mode-shoulder .persona-img {
      height: 930px;
      right: -118px;
      bottom: -560px;
    }
    .portrait-anchor.persona-mode-bust .persona-img {
      height: 850px;
      right: -90px;
      bottom: -486px;
    }

    .diagonal-newsstand .copy {
      left: 66px;
      top: 78px;
      width: 650px;
      transform: rotate(-3.7deg);
      transform-origin: left top;
    }
    .diagonal-newsstand .subtitle {
      display: inline-block;
      color: var(--red);
      font-size: 30px;
      line-height: 1;
      margin: 0 0 12px 8px;
      padding: 0 26px 7px 0;
      border-bottom: 1px solid rgba(146,29,22,.58);
    }
    .diagonal-newsstand .cover-title {
      font-size: 112px;
      line-height: .88;
      max-width: 638px;
    }
    .diagonal-newsstand.title-short .cover-title { font-size: 132px; max-width: 650px; }
    .diagonal-newsstand.title-medium .cover-title { font-size: 122px; }
    .diagonal-newsstand.title-long .cover-title { font-size: 82px; line-height: .94; max-width: 662px; }
    .diagonal-newsstand .highlight {
      margin-top: 4px;
      padding-top: 6px;
      border-top: 2px solid var(--red);
      font-size: 58px;
      line-height: .94;
    }
    .diagonal-newsstand .top-red {
      left: auto;
      right: -34px;
      top: 25px;
      width: 432px;
      height: 25px;
      transform: rotate(-5.5deg);
      transform-origin: right center;
    }
    .diagonal-newsstand .thin-rule {
      left: 8px;
      top: 78px;
      width: 520px;
      background: rgba(17,17,17,.42);
      transform: rotate(-4.8deg);
    }
    .diagonal-newsstand .right-meta { display: none; }
    .diagonal-newsstand .right-panel { display: none; }
    .diagonal-newsstand .red-arc {
      display: none;
    }
    .diagonal-newsstand .dot-left {
      left: 68px;
      top: 6px;
      height: 150px;
    }
    .diagonal-newsstand .dot-right {
      right: 36px;
      top: 10px;
      height: 170px;
    }
    .diagonal-newsstand .tags { display: none; }
    .diagonal-newsstand .brand-chip { display: flex; }
    .diagonal-newsstand .persona-stage {
      right: -58px;
      bottom: -2px;
      width: 438px;
    }
    .diagonal-newsstand.persona-mode-half .persona-img {
      height: 765px;
      right: -52px;
      bottom: -394px;
    }
    .diagonal-newsstand.persona-mode-shoulder .persona-img {
      height: 935px;
      right: -120px;
      bottom: -590px;
    }
    .diagonal-newsstand.persona-mode-bust .persona-img {
      height: 850px;
      right: -94px;
      bottom: -512px;
    }
    .diagonal-newsstand .cut-slab {
      display: block;
      right: -42px;
      bottom: -52px;
      width: 530px;
      height: 120px;
      transform: rotate(-8deg);
    }

    .black-label .copy {
      left: 48px;
      top: 70px;
      width: 600px;
    }
    .black-label .cover-title {
      max-width: 575px;
      font-family: var(--sans-title);
      font-size: 100px;
      line-height: .94;
      font-weight: 900;
      letter-spacing: -1px;
    }
    .black-label.title-short .cover-title { font-size: 128px; }
    .black-label.title-medium .cover-title { font-size: 108px; }
    .black-label.title-long .cover-title { font-size: 78px; line-height: .98; max-width: 600px; }
    .black-label .subtitle {
      color: var(--red);
      font-family: var(--serif-title);
      font-size: 29px;
      margin-bottom: 18px;
      border-bottom: 0;
      padding-bottom: 0;
    }
    .black-label .highlight {
      margin-top: 10px;
      padding: 6px 20px 9px;
      background: linear-gradient(180deg, var(--red), var(--red-dark));
      color: var(--paper-light);
      font-family: var(--sans-title);
      font-size: 58px;
      line-height: .98;
      text-shadow: 0 1px 0 rgba(0,0,0,.18);
    }
    .black-label .right-panel {
      display: none;
    }
    .black-label .right-meta {
      right: 328px;
      top: 44px;
    }
    .black-label .top-red {
      left: 50px;
      top: 43px;
      width: 170px;
      height: 7px;
      transform: none;
    }
    .black-label .thin-rule {
      left: 50px;
      top: auto;
      bottom: 42px;
      width: 240px;
      background: var(--red);
      transform: none;
    }
    .black-label .tags {
      bottom: 64px;
      padding-top: 0;
      border-top: 0;
      font-size: 17px;
    }
    .black-label .persona-stage {
      right: -52px;
      width: 420px;
    }
    .black-label.persona-mode-half .persona-img {
      height: 760px;
      right: -42px;
      bottom: -388px;
    }
    .black-label.persona-mode-shoulder .persona-img {
      height: 930px;
      right: -112px;
      bottom: -568px;
    }
    .black-label.persona-mode-bust .persona-img {
      height: 845px;
      right: -88px;
      bottom: -496px;
    }
    .subtitle-medium .subtitle { font-size: 28px; }
    .subtitle-long .subtitle {
      font-size: 24px;
      padding-right: 18px;
    }
    .highlight-medium .highlight { font-size: 44px; }
    .highlight-long .highlight { font-size: 38px; }
    .diagonal-newsstand.subtitle-medium .subtitle { font-size: 27px; }
    .diagonal-newsstand.subtitle-long .subtitle {
      font-size: 23px;
      margin-bottom: 10px;
    }
    .diagonal-newsstand.highlight-medium .highlight { font-size: 52px; }
    .diagonal-newsstand.highlight-long .highlight { font-size: 45px; }
    .black-label.subtitle-medium .subtitle { font-size: 27px; }
    .black-label.subtitle-long .subtitle { font-size: 23px; }
    .black-label.highlight-medium .highlight { font-size: 53px; }
    .black-label.highlight-long .highlight { font-size: 47px; }
  </style>
</head>
<body>
  <main class="cover {{ACCOUNT_STYLE}} {{VARIANT}} preset-{{PRESET}} persona-mode-{{PERSONA_MODE}} {{TITLE_SIZE}} {{SUBTITLE_SIZE}} {{HIGHLIGHT_SIZE}}">
    <div class="dot-field dot-left"></div>
    <div class="dot-field dot-right"></div>
    <div class="grid-mark"></div>
    <div class="red-arc"></div>
    <div class="top-red"></div>
    <div class="thin-rule"></div>
    <div class="right-panel"></div>
    <div class="right-meta">
      {{BRAND}}<br />
      FIELD NOTES<br />
      No.{{ISSUE_NO}}
    </div>
    <section class="copy">
      <div class="subtitle">{{COVER_SUBTITLE}}</div>
      <h1 class="cover-title">{{COVER_TITLE}}</h1>
      <div class="highlight">{{HIGHLIGHT}}</div>
    </section>
    <div class="tags">{{TAGS}}</div>
    <div class="brand-chip">{{BRAND}} / FIELD NOTES</div>
    <div class="persona-stage">
      <img class="persona-img" src="{{PERSONA_SRC}}" alt="" />
    </div>
    <div class="cut-slab"></div>
  </main>
</body>
</html>
