<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>Brutalism Cover Template</title>
<style>
@font-face{font-family:"XinYuGongHeXieSong";src:url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-H.ttf") format("truetype");font-weight:900;font-display:block;}
@font-face{font-family:"XinYuGongHeXieSong";src:url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-B.ttf") format("truetype");font-weight:700;font-display:block;}
@font-face{font-family:"XinYuGongHeXieSong";src:url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-M.ttf") format("truetype");font-weight:500;font-display:block;}
@font-face{font-family:"XinYuGongHeXieSong";src:url("file:///home/ubuntu/.fonts/xinyugong/新愚公和谐宋-R.ttf") format("truetype");font-weight:400;font-display:block;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"XinYuGongHeXieSong",sans-serif;width:900px;height:383px;
  background:#FFEB3B;position:relative;overflow:hidden;}
body::before{content:"";position:absolute;inset:0;
  background-image:radial-gradient(#000 1px,transparent 1px);
  background-size:14px 14px;opacity:.08;}
.frame{position:absolute;inset:18px;background:#FFEB3B;
  border:4px solid #000;box-shadow:8px 8px 0 0 #000;
  padding:24px 28px;display:flex;flex-direction:column;}
.top{display:flex;justify-content:space-between;align-items:center;}
.brand{font-weight:900;font-size:16px;letter-spacing:2px;background:#000;color:#FFEB3B;padding:6px 12px;}
.issue{font-weight:700;font-size:14px;letter-spacing:1px;border:3px solid #000;padding:5px 10px;background:#fff;}
.middle{flex:1;display:flex;align-items:center;margin-top:18px;}
.title{font-weight:900;font-size:84px;line-height:.92;letter-spacing:-3px;color:#000;}
.title .hl{color:#E53935;background:#000;padding:0 8px;display:inline-block;
  transform:rotate(-2deg);box-shadow:6px 6px 0 #E53935;}
.title .sub{display:block;font-size:30px;font-weight:700;margin-top:14px;letter-spacing:-.5px;
  background:#fff;padding:6px 14px;border:3px solid #000;width:fit-content;transform:rotate(-1deg);}
.bottom{display:flex;justify-content:space-between;align-items:flex-end;}
.tags{display:flex;gap:8px;}
.tag{font-weight:900;font-size:13px;padding:6px 10px;border:3px solid #000;background:#fff;}
.tag.k{background:#000;color:#FFEB3B;}
.stamp{font-weight:900;font-size:20px;letter-spacing:2px;color:#E53935;
  border:4px solid #E53935;padding:8px 14px;transform:rotate(4deg);background:#fff;}
</style></head>
<body><div class="frame">
  <div class="top">
    <div class="brand">{{BRAND}}</div>
    <div class="issue">{{ISSUE}}</div>
  </div>
  <div class="middle">
    <div>
      <div class="title">{{TITLE_LINE1}}<br/><span class="hl">{{TITLE_HL}}</span>
        <span class="sub">{{SUBTITLE}}</span>
      </div>
    </div>
  </div>
  <div class="bottom">
    <div class="tags">
      <span class="tag k">{{TAG_1}}</span>
      <span class="tag">{{TAG_2}}</span>
      <span class="tag">{{TAG_3}}</span>
    </div>
    <div class="stamp">{{STAMP}}</div>
  </div>
</div></body></html>
